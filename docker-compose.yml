version: '3.8'
services:
  ragent-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - RAGENT_DATABASE_URL=postgresql+asyncpg://ragent:ragent123@postgres:5432/ragent
      - RAGENT_REDIS_URL=redis://redis:6379/0
      - RAGENT_CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      - postgres
      - redis
    command: uvicorn ragent.main:app --host 0.0.0.0 --port 8000 --workers 4

  ragent-worker:
    build: .
    environment:
      - RAGENT_DATABASE_URL=postgresql+asyncpg://ragent:ragent123@postgres:5432/ragent
      - RAGENT_REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
      - rabbitmq
    command: celery -A ragent.common.celery_app worker -l info

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ragent
      POSTGRES_USER: ragent
      POSTGRES_PASSWORD: ragent123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ragent
      RABBITMQ_DEFAULT_PASS: ragent123

volumes:
  pgdata:
  redisdata:
