# ===========================================================================
# Ragent Docker Compose — 完整部署编排
# 服务: redis, postgres, ragent-api, ragent-worker, ragent-web, prometheus, grafana
# ===========================================================================

services:
  # ---------------------------------------------------------------------------
  # Redis 7 — 缓存(db0) + Celery broker(db1) + Celery result backend(db2)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ragent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --save 60 1000
      --save 300 100
      --appendonly yes
      --databases 16
    volumes:
      - redis-data:/data
    networks:
      - ragent-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — 用户与业务数据持久化
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ragent-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ragent
      POSTGRES_PASSWORD: ragent_secret_2026
      POSTGRES_DB: ragent
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ragent-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragent -d ragent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Ragent API — FastAPI 服务
  # ---------------------------------------------------------------------------
  ragent-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ragent-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://ragent:ragent_secret_2026@postgres:5432/ragent"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/1"
      CELERY_RESULT_BACKEND: "redis://redis:6379/2"
      GLM_API_KEY: "4504e93870d94c269d2024ed4883bff9.TRUOA9FvRsS2H7Rf"
      GLM_BASE_URL: "https://open.bigmodel.cn/api/coding/paas/v4"
      GLM_MODEL: "openai/glm-4-flash"
      SILICONFLOW_API_KEY: "sk-mipwwquycjbjhghonlduaffmgcvpkiwhwtogjbnkbcliuzar"
      EMBEDDING_MODEL: "Qwen/Qwen3-Embedding-8B"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "ragent.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./tests/fixtures/pdfs:/data/pdfs:ro
    networks:
      - ragent-net

  # ---------------------------------------------------------------------------
  # Ragent Worker — Celery 异步任务处理
  # ---------------------------------------------------------------------------
  ragent-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ragent-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql+asyncpg://ragent:ragent_secret_2026@postgres:5432/ragent"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/1"
      CELERY_RESULT_BACKEND: "redis://redis:6379/2"
      GLM_API_KEY: "4504e93870d94c269d2024ed4883bff9.TRUOA9FvRsS2H7Rf"
      GLM_BASE_URL: "https://open.bigmodel.cn/api/coding/paas/v4"
      GLM_MODEL: "openai/glm-4-flash"
      SILICONFLOW_API_KEY: "sk-mipwwquycjbjhghonlduaffmgcvpkiwhwtogjbnkbcliuzar"
      EMBEDDING_MODEL: "Qwen/Qwen3-Embedding-8B"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "ragent.common.celery_worker", "worker", "-l", "info", "-c", "4", "-Q", "ingestion.task,ingestion.chunk,rag.feedback,celery"]
    volumes:
      - ./tests/fixtures/pdfs:/data/pdfs:ro
    networks:
      - ragent-net

  # ---------------------------------------------------------------------------
  # Ragent Web — 前端 (React + Nginx)
  # ---------------------------------------------------------------------------
  ragent-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ragent-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - ragent-api
    networks:
      - ragent-net

  # ---------------------------------------------------------------------------
  # Prometheus — 指标采集
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: ragent-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - ragent-net
    depends_on:
      - ragent-api

  # ---------------------------------------------------------------------------
  # Grafana — 可视化仪表盘
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: ragent-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "ragent...2026"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - ragent-net
    depends_on:
      - prometheus

# ===========================================================================
# 网络
# ===========================================================================
networks:
  ragent-net:
    driver: bridge
    name: ragent-net

# ===========================================================================
# 卷
# ===========================================================================
volumes:
  redis-data:
    name: ragent-redis-data
  postgres-data:
    name: ragent-postgres-data
  grafana-data:
    name: ragent-grafana-data
